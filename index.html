<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini Chatbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="header-left">
        <div class="gem-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
              fill="url(#gemGrad)" stroke="none"/>
            <defs>
              <linearGradient id="gemGrad" x1="2" y1="2" x2="22" y2="22">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header-info">
          <span class="header-title">Gemini</span>
          <span class="header-sub">AI Assistant</span>
        </div>
      </div>
      <div class="header-right">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
        <button class="clear-btn" id="clearBtn" title="Xóa cuộc trò chuyện">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="api-setup" id="apiSetup">
      <div class="api-icon">🔑</div>
      <p class="api-label">Nhập Gemini API Key của bạn</p>
      <div class="api-input-row">
        <input type="password" id="apiKeyInput" placeholder="AIza..." />
        <button id="saveApiBtn">Lưu</button>
      </div>
      <p class="api-hint">
        Lấy API key miễn phí tại đây
        <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
      </p>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="welcome-msg">
        <div class="welcome-icon">✦</div>
        <p>Xin chào! Tôi là Gemini. Hãy hỏi tôi bất cứ điều gì.</p>
      </div>
    </div>


    <div class="chat-input-area">
      <div class="input-box">
        <textarea
          id="userInput"
          placeholder="Nhắn tin với Gemini..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-footer">Gemini có thể mắc lỗi. Hãy kiểm tra thông tin quan trọng.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
